openapi: 3.1.0
info:
  title: Whoice API
  version: 0.1.0-alpha
  description: Modular WHOIS and RDAP lookup API.
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [ok, version, time]
                properties:
                  ok:
                    type: boolean
                  version:
                    type: string
                  time:
                    type: string
                    format: date-time
                  config:
                    $ref: "#/components/schemas/ConfigStatus"
  /api/version:
    get:
      summary: Version, capabilities, and plugin descriptors
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                type: object
                required: [version, data, capabilities, plugins]
                properties:
                  version:
                    type: string
                  data:
                    type: object
                    additionalProperties:
                      type: string
                  capabilities:
                    $ref: "#/components/schemas/Capabilities"
                  plugins:
                    type: array
                    items:
                      $ref: "#/components/schemas/PluginInfo"
                  config:
                    $ref: "#/components/schemas/ConfigStatus"
  /api/capabilities:
    get:
      summary: Runtime capability flags
      responses:
        "200":
          description: Capability response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      capabilities:
                        $ref: "#/components/schemas/Capabilities"
  /api/metrics:
    get:
      summary: Prometheus-style runtime metrics
      responses:
        "200":
          description: Text metrics payload
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Metrics are disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
  /api/admin/status:
    get:
      summary: Runtime status and counters
      responses:
        "200":
          description: Admin status
          content:
            application/json:
              schema:
                type: object
                required: [ok, version, capabilities, plugins, stats]
                properties:
                  ok:
                    type: boolean
                  version:
                    type: string
                  capabilities:
                    $ref: "#/components/schemas/Capabilities"
                  plugins:
                    type: array
                    items:
                      $ref: "#/components/schemas/PluginInfo"
                  stats:
                    $ref: "#/components/schemas/AdminStats"
                  config:
                    $ref: "#/components/schemas/ConfigStatus"
        "401":
          description: Authentication required when auth is enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
  /api/admin/config:
    get:
      summary: Reserved Web config editor capability endpoint
      description: Returns admin-gated capability metadata for a future Web config editor. It intentionally does not expose the config source.
      responses:
        "200":
          description: Config editor capability metadata
          content:
            application/json:
              schema:
                type: object
                required: [ok, config, editor]
                properties:
                  ok:
                    type: boolean
                  config:
                    $ref: "#/components/schemas/ConfigStatus"
                  editor:
                    $ref: "#/components/schemas/ConfigEditorStatus"
        "401":
          description: Authentication required when auth is enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
    patch:
      summary: Reserved Web config editor write endpoint
      description: Placeholder for future restricted-controls or source-file editing. Current builds return 501 and never write the config file.
      responses:
        "501":
          description: Config editor is reserved but not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "401":
          description: Authentication required when auth is enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
  /api/lookup:
    get:
      summary: Lookup a domain, URL, IP, ASN, or CIDR
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: rdap
          in: query
          required: false
          schema:
            type: boolean
        - name: whois
          in: query
          required: false
          schema:
            type: boolean
        - name: rdap_server
          in: query
          required: false
          schema:
            type: string
        - name: whois_server
          in: query
          required: false
          schema:
            type: string
        - name: whois_follow
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 5
        - name: exact_domain
          in: query
          required: false
          description: Query the full typed domain instead of reducing to the PSL registrable domain.
          schema:
            type: boolean
        - name: ai
          in: query
          required: false
          description: UI hint for background AI registration analysis; the lookup response itself does not wait for AI.
          schema:
            type: boolean
      responses:
        "200":
          description: Lookup succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "400":
          description: Invalid or missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "403":
          description: Option blocked by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "502":
          description: Upstream lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
  /api/lookup/ai:
    post:
      summary: Analyze registration fields from an existing lookup result with the optional AI parser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [result]
              properties:
                result:
                  $ref: "#/components/schemas/LookupResult"
                force:
                  type: boolean
                  default: true
      responses:
        "200":
          description: AI analysis completed or was skipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "400":
          description: Invalid AI analysis request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "503":
          description: AI parser is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
  /api/icp:
    get:
      summary: Query ICP filing information for a domain
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        "200":
          description: ICP lookup completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ICPResponse"
        "400":
          description: Invalid or missing domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ICPResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ICPResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ICPResponse"
        "503":
          description: ICP lookup is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ICPResponse"
        "502":
          description: Upstream ICP lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ICPResponse"
components:
  schemas:
    APIResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        result:
          $ref: "#/components/schemas/LookupResult"
        error:
          $ref: "#/components/schemas/APIError"
        capabilities:
          $ref: "#/components/schemas/Capabilities"
        meta:
          $ref: "#/components/schemas/ResultMeta"
        config:
          $ref: "#/components/schemas/ConfigStatus"
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
    ICPResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        result:
          $ref: "#/components/schemas/ICPResult"
        error:
          $ref: "#/components/schemas/APIError"
        meta:
          $ref: "#/components/schemas/ResultMeta"
        config:
          $ref: "#/components/schemas/ConfigStatus"
    ConfigStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
        path:
          type: string
        loadedAt:
          type: string
        lastCheckedAt:
          type: string
        lastAttemptAt:
          type: string
        lastErrorAt:
          type: string
        lastError:
          type: string
        rolledBack:
          type: boolean
        usingLoadedAt:
          type: string
    ConfigEditorStatus:
      type: object
      required: [status, format, writable, sourceReadable, surfaces, supportedOperations]
      properties:
        status:
          type: string
        path:
          type: string
        format:
          type: string
        writable:
          type: boolean
        sourceReadable:
          type: boolean
        surfaces:
          type: array
          items:
            type: string
        supportedOperations:
          type: array
          items:
            type: string
        reason:
          type: string
    ICPResult:
      type: object
      required: [domain, status, cached]
      properties:
        domain:
          type: string
        status:
          type: string
          enum: [found, not_found, error]
        records:
          type: array
          items:
            $ref: "#/components/schemas/ICPRecord"
        source:
          type: string
        cached:
          type: boolean
        cachedAt:
          type: string
        expiresAt:
          type: string
        elapsedMs:
          type: integer
        message:
          type: string
    ICPRecord:
      type: object
      properties:
        domain:
          type: string
        domainId:
          type: integer
        unitName:
          type: string
        natureName:
          type: string
        mainLicence:
          type: string
        serviceLicence:
          type: string
        serviceName:
          type: string
        contentTypeName:
          type: string
        limitAccess:
          type: string
        updateRecordTime:
          type: string
    LookupResult:
      type: object
      required:
        - query
        - normalizedQuery
        - type
        - status
        - source
        - domain
        - registry
        - registrar
        - dates
        - statuses
        - nameservers
        - dnssec
        - registrant
        - network
        - enrichment
        - raw
        - meta
      properties:
        query:
          type: string
        normalizedQuery:
          type: string
        type:
          $ref: "#/components/schemas/QueryType"
        status:
          $ref: "#/components/schemas/ResultStatus"
        source:
          $ref: "#/components/schemas/SourceInfo"
        domain:
          $ref: "#/components/schemas/DomainInfo"
        registry:
          $ref: "#/components/schemas/RegistryInfo"
        registrar:
          $ref: "#/components/schemas/RegistrarInfo"
        dates:
          $ref: "#/components/schemas/DateInfo"
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/DomainStatus"
        nameservers:
          type: array
          items:
            $ref: "#/components/schemas/Nameserver"
        dnssec:
          $ref: "#/components/schemas/DNSSECInfo"
        registrant:
          $ref: "#/components/schemas/RegistrantInfo"
        network:
          $ref: "#/components/schemas/NetworkInfo"
        enrichment:
          $ref: "#/components/schemas/EnrichmentInfo"
        raw:
          $ref: "#/components/schemas/RawData"
        meta:
          $ref: "#/components/schemas/ResultMeta"
    QueryType:
      type: string
      enum: [domain, ipv4, ipv6, asn, cidr, url, unknown]
    ResultStatus:
      type: string
      enum: [registered, unregistered, reserved, unknown, error]
    SourceName:
      type: string
      enum: [rdap, whois, whoisWeb]
    SourceInfo:
      type: object
      required: [used]
      properties:
        primary:
          $ref: "#/components/schemas/SourceName"
        used:
          type: array
          items:
            $ref: "#/components/schemas/SourceName"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/SourceError"
    SourceError:
      type: object
      required: [source, error]
      properties:
        source:
          $ref: "#/components/schemas/SourceName"
        server:
          type: string
        error:
          type: string
    DomainInfo:
      type: object
      required: [reserved, registered]
      properties:
        name:
          type: string
        unicodeName:
          type: string
        punycodeName:
          type: string
        suffix:
          type: string
        registeredDomain:
          type: string
        reserved:
          type: boolean
        registered:
          type: boolean
    RegistryInfo:
      type: object
      properties:
        name:
          type: string
        website:
          type: string
        whoisServer:
          type: string
        rdapServer:
          type: string
    RegistrarInfo:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        ianaId:
          type: string
        country:
          type: string
        whoisServer:
          type: string
        rdapServer:
          type: string
        brand:
          $ref: "#/components/schemas/Brand"
        source:
          type: string
        confidence:
          type: number
        evidence:
          type: string
    Brand:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        color:
          type: string
        logo:
          type: string
        website:
          type: string
        aliases:
          type: array
          items:
            type: string
    DateInfo:
      type: object
      properties:
        createdAt:
          type: string
        updatedAt:
          type: string
        expiresAt:
          type: string
        availableAt:
          type: string
        ageDays:
          type: integer
        remainingDays:
          type: integer
    DomainStatus:
      type: object
      required: [code]
      properties:
        code:
          type: string
        label:
          type: string
        category:
          type: string
        description:
          type: string
        url:
          type: string
        source:
          type: string
    Nameserver:
      type: object
      required: [host]
      properties:
        host:
          type: string
        addresses:
          type: array
          items:
            type: string
        brand:
          $ref: "#/components/schemas/Brand"
    DNSSECInfo:
      type: object
      properties:
        signed:
          type: boolean
        text:
          type: string
    RegistrantInfo:
      type: object
      properties:
        name:
          type: string
        organization:
          type: string
        country:
          type: string
        province:
          type: string
        city:
          type: string
        address:
          type: string
        postalCode:
          type: string
        email:
          type: string
        phone:
          type: string
        extra:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationField"
        fieldSources:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/RegistrationField"
        source:
          type: string
        confidence:
          type: number
        evidence:
          type: string
    RegistrationField:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
        source:
          type: string
        confidence:
          type: number
        evidence:
          type: string
    NetworkInfo:
      type: object
      properties:
        cidr:
          type: string
        range:
          type: string
        name:
          type: string
        type:
          type: string
        originAS:
          type: string
        country:
          type: string
    EnrichmentInfo:
      type: object
      properties:
        dns:
          $ref: "#/components/schemas/DNSInfo"
        dnsviz:
          $ref: "#/components/schemas/DNSVizInfo"
        pricing:
          $ref: "#/components/schemas/PricingInfo"
        moz:
          $ref: "#/components/schemas/MozInfo"
    DNSVizInfo:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
    PricingInfo:
      type: object
      properties:
        register:
          type: number
        renew:
          type: number
        transfer:
          type: number
        currency:
          type: string
        provider:
          type: string
        source:
          type: string
        updatedAt:
          type: string
        registerOffer:
          $ref: "#/components/schemas/PricingOffer"
        renewOffer:
          $ref: "#/components/schemas/PricingOffer"
        transferOffer:
          $ref: "#/components/schemas/PricingOffer"
    PricingOffer:
      type: object
      properties:
        registrar:
          type: string
        website:
          type: string
          format: uri
        logo:
          type: string
          format: uri
        price:
          type: number
        currency:
          type: string
        priceCny:
          type: number
    MozInfo:
      type: object
      properties:
        domainAuthority:
          type: integer
        pageAuthority:
          type: integer
        spamScore:
          type: integer
        source:
          type: string
        updatedAt:
          type: string
    DNSInfo:
      type: object
      properties:
        a:
          type: array
          items:
            $ref: "#/components/schemas/DNSAddress"
        aaaa:
          type: array
          items:
            $ref: "#/components/schemas/DNSAddress"
        cname:
          type: string
        mx:
          type: array
          items:
            $ref: "#/components/schemas/DNSMX"
        ns:
          type: array
          items:
            type: string
        registryNs:
          type: array
          items:
            type: string
        nsMismatch:
          type: boolean
        resolvers:
          type: array
          items:
            $ref: "#/components/schemas/DNSResolverInfo"
        elapsedMs:
          type: integer
    DNSAddress:
      type: object
      required: [ip, version]
      properties:
        ip:
          type: string
        version:
          type: string
          enum: [ipv4, ipv6]
        reverse:
          type: string
        source:
          type: string
          enum: [udp, doh, system]
        resolver:
          type: string
        endpoint:
          type: string
    DNSResolverInfo:
      type: object
      required: [source, resolver]
      properties:
        source:
          type: string
          enum: [udp, doh, system]
        resolver:
          type: string
        endpoint:
          type: string
        status:
          type: string
          enum: [ok, empty, error]
        error:
          type: string
    DNSMX:
      type: object
      required: [host, pref]
      properties:
        host:
          type: string
        pref:
          type: integer
    RawData:
      type: object
      properties:
        whois:
          type: string
        whoisWeb:
          type: string
        rdap:
          type: string
    ResultMeta:
      type: object
      required: [elapsedMs]
      properties:
        elapsedMs:
          type: integer
        warnings:
          type: array
          items:
            type: string
        traceId:
          type: string
        pendingEnrichments:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderTrace"
        ai:
          $ref: "#/components/schemas/AITrace"
    AITrace:
      type: object
      required: [status]
      properties:
        provider:
          type: string
        model:
          type: string
        status:
          type: string
        cached:
          type: boolean
        elapsedMs:
          type: integer
        attempts:
          type: integer
        applied:
          type: array
          items:
            type: string
        reason:
          type: string
        error:
          type: string
    ProviderTrace:
      type: object
      required: [source, status, elapsedMs]
      properties:
        source:
          $ref: "#/components/schemas/SourceName"
        status:
          type: string
          enum: [ok, error, skipped]
        server:
          type: string
        query:
          type: string
        statusCode:
          type: integer
        contentType:
          type: string
        bytes:
          type: integer
        elapsedMs:
          type: integer
        error:
          type: string
    Capabilities:
      type: object
      required: [api, apiEndpoints, apiIpAllowlist, rdap, whois, whoisWeb, customServers, auth, rateLimit, icpAutoQuery, enrichment]
      properties:
        api:
          type: boolean
        apiEndpoints:
          type: object
          additionalProperties:
            type: boolean
        apiIpAllowlist:
          type: boolean
        rdap:
          type: boolean
        whois:
          type: boolean
        whoisWeb:
          type: boolean
        customServers:
          type: boolean
        auth:
          type: string
        rateLimit:
          type: boolean
        icpAutoQuery:
          type: boolean
        enrichment:
          type: object
          additionalProperties:
            type: boolean
    PluginInfo:
      type: object
      required: [kind, name, version, enabled]
      properties:
        kind:
          type: string
        name:
          type: string
        version:
          type: string
        enabled:
          type: boolean
    AdminStats:
      type: object
      required: [startedAt, uptimeSec, lookups]
      properties:
        startedAt:
          type: string
          format: date-time
        uptimeSec:
          type: integer
        lookups:
          type: object
          required: [total, succeeded, failed, lastElapsedMs]
          properties:
            total:
              type: integer
            succeeded:
              type: integer
            failed:
              type: integer
            lastElapsedMs:
              type: integer
