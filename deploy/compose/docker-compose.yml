# Whoice single-file deployment. Download this file and run `docker compose up -d`.
# Whoice 单文件部署。下载本文件后直接运行 `docker compose up -d`。
services:
  # Lookup API. Creates ./data/whoice.toml on first startup.
  # 查询 API。首次启动会自动生成 ./data/whoice.toml。
  lookup-api:
    image: ghcr.io/xmzo/whoice-lookup-api:latest
    pull_policy: always
    ports:
      # Web users normally visit 18081; 18080 is the direct API port.
      # 普通访问用 18081；18080 是直连 API 端口。
      - "0.0.0.0:18080:8080"
    volumes:
      # Keep config, caches, and optional data overrides beside this yml.
      # 配置、缓存、可选数据覆盖都保存在本 yml 同级目录。
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "WHOICE_HEALTHCHECK_ADDR=:8080 /app/whoice-api healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - whoice
    restart: unless-stopped

  # Web UI. Talks to lookup-api through the internal Docker network.
  # Web 界面。通过 Docker 内网访问 lookup-api。
  web:
    image: ghcr.io/xmzo/whoice-web:latest
    pull_policy: always
    ports:
      - "0.0.0.0:18081:8081"
    depends_on:
      lookup-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8081/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - whoice
    restart: unless-stopped

networks:
  whoice:
    name: whoice
    # Requires Docker daemon IPv6 support. Docker Engine can auto-allocate a ULA
    # IPv6 subnet for this custom bridge when no subnet is specified.
    # 需要 Docker daemon 已开启 IPv6。这里不指定自定义 IPv6 段，
    # 由 Docker Engine 自动为这个自定义 bridge 分配 ULA。
    # Recreate an existing network after changing this:
    # 修改后已有网络需要重建：
    # docker compose down
    # docker network rm whoice || true
    # docker compose up -d
    enable_ipv6: true
