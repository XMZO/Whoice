name: Container Images

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*"
      - "*alpha"
      - "v*beta"
      - "*beta"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag for a manual build"
        required: false
        default: "manual"

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image_name }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: lookup-api
            package: whoice-lookup-api
            dockerfile: services/lookup-api/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image_name: lookup-api
            package: whoice-lookup-api
            dockerfile: services/lookup-api/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image_name: web
            package: whoice-web
            dockerfile: apps/web/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image_name: web
            package: whoice-web
            dockerfile: apps/web/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare image variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          namespace="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${namespace}/${{ matrix.package }}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.image_tag || 'manual' }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "arch_tag=${image}:${version}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push native image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.vars.outputs.arch_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.title=Whoice ${{ matrix.image_name }}
          cache-from: type=gha,scope=${{ matrix.image_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}-${{ matrix.arch }}
          provenance: true
          sbom: true

  manifest:
    name: Publish manifest ${{ matrix.image.name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: lookup-api
            package: whoice-lookup-api
          - name: web
            package: whoice-web

    steps:
      - name: Prepare manifest variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          namespace="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${namespace}/${{ matrix.image.package }}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.image_tag || 'manual' }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.vars.outputs.image }}"
          version="${{ steps.vars.outputs.version }}"

          tag_args=("-t" "${image}:${version}")
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            tag_args+=("-t" "${image}:latest")
          fi
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            semver="${GITHUB_REF_NAME#v}"
            major_minor="$(awk -F. '{print $1 "." $2}' <<< "$semver")"
            tag_args+=("-t" "${image}:${semver}" "-t" "${image}:${major_minor}")
          fi

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${image}:${version}-amd64" \
            "${image}:${version}-arm64"
